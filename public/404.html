<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>К2 Платформа</title>
    <script type="text/javascript">
      // SPA-фикс для GitHub Pages.
      // GitHub Pages отдаёт этот 404.html при прямом заходе на любой не-корневой путь (/crm, /installments и т.д.).
      // Мы перекидываем браузер на корень со специальной меткой в query, которую потом декодирует index.html.
      // Источник идеи: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 0; // 0 для кастомного домена, 1 для user.github.io/repo

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
